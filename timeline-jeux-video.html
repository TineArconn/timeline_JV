<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frise Chronologique — Jeux Vidéo 1990–2020</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --neon-purple: #b400ff;
    --dark-bg: #050510;
    --card-bg: rgba(10,10,35,0.88);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background-color: var(--dark-bg);
    font-family: 'Rajdhani', sans-serif;
    color: #e0e0ff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 8%  12%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 55%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 28%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 75%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 42%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 38%, rgba(0,245,255,.3)  0%, transparent 100%),
      radial-gradient(2px 2px at 55% 65%, rgba(180,0,255,.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 92%  8%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 88%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 70%, rgba(255,230,0,.2)  0%, transparent 100%);
    background-size: 700px 700px; pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
    pointer-events:none; z-index:1;
  }

  .wrapper { position:relative; z-index:2; max-width:960px; margin:0 auto; padding:60px 20px 100px; }

  /* HEADER */
  header { text-align:center; margin-bottom:80px; }
  .header-tag { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--neon-cyan); letter-spacing:4px; margin-bottom:20px; animation:blink 1.4s step-start infinite; }
  @keyframes blink { 50%{opacity:0} }
  h1 { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(1.9rem,6vw,4rem); line-height:1.1; letter-spacing:-1px; background:linear-gradient(135deg,var(--neon-cyan) 0%,var(--neon-pink) 55%,var(--neon-yellow) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 28px rgba(0,245,255,.4)); margin-bottom:14px; }
  .subtitle { font-size:1rem; font-weight:600; color:rgba(200,200,255,.55); letter-spacing:6px; text-transform:uppercase; }
  .header-line { margin-top:28px; height:2px; background:linear-gradient(90deg,transparent,var(--neon-cyan),var(--neon-pink),transparent); box-shadow:0 0 12px var(--neon-cyan); }
  .game-count { margin-top:14px; font-family:'Press Start 2P',monospace; font-size:7px; color:rgba(150,150,200,.5); letter-spacing:2px; }

  /* DECADE */
  .decade-sep { position:relative; display:flex; align-items:center; margin:70px 0 44px -60px; padding-left:60px; }
  .decade-sep::before { content:''; position:absolute; left:11px; width:21px; height:21px; border-radius:50%; background:var(--neon-yellow); box-shadow:0 0 22px var(--neon-yellow),0 0 44px rgba(255,230,0,.28); z-index:2; }
  .decade-label { font-family:'Press Start 2P',monospace; font-size:18px; color:var(--neon-yellow); letter-spacing:3px; text-shadow:0 0 20px var(--neon-yellow); padding:8px 20px; border:2px solid rgba(255,230,0,.35); background:rgba(255,230,0,.05); border-radius:4px; backdrop-filter:blur(4px); }

  /* SPINE */
  .timeline { position:relative; padding-left:60px; }
  .timeline::before { content:''; position:absolute; left:20px; top:0; bottom:0; width:3px; background:linear-gradient(to bottom,var(--neon-cyan),var(--neon-purple),var(--neon-pink),var(--neon-yellow),var(--neon-green),var(--neon-cyan)); box-shadow:0 0 14px rgba(0,245,255,.45); border-radius:2px; }

  /* ENTRY */
  .entry { position:relative; display:flex; align-items:flex-start; margin-bottom:26px; opacity:0; transform:translateX(-18px); transition:opacity .45s ease,transform .45s ease; }
  .entry.visible { opacity:1; transform:translateX(0); }
  .entry::before { content:''; position:absolute; left:-48px; top:17px; width:13px; height:13px; border-radius:50%; border:2px solid currentColor; background:var(--dark-bg); z-index:2; transition:transform .2s,box-shadow .2s; }
  .entry::after  { content:''; position:absolute; left:-35px; top:23px; width:35px; height:2px; background:currentColor; opacity:.35; }
  .entry:hover::before { transform:scale(1.7); box-shadow:0 0 8px currentColor; }
  .entry:nth-child(6n+1) { color:var(--neon-cyan);   }
  .entry:nth-child(6n+2) { color:var(--neon-pink);   }
  .entry:nth-child(6n+3) { color:var(--neon-green);  }
  .entry:nth-child(6n+4) { color:var(--neon-purple); }
  .entry:nth-child(6n+5) { color:var(--neon-yellow); }
  .entry:nth-child(6n+6) { color:var(--neon-cyan);   }

  .year-badge { font-family:'Orbitron',sans-serif; font-weight:700; font-size:.72rem; color:inherit; background:rgba(0,0,0,.5); border:1px solid currentColor; border-radius:3px; padding:3px 8px; white-space:nowrap; margin-right:14px; margin-top:13px; box-shadow:0 0 7px currentColor; flex-shrink:0; letter-spacing:1px; }

  /* CARD */
  .card { display:flex; gap:14px; align-items:flex-start; background:var(--card-bg); border:1px solid rgba(255,255,255,.06); border-left:3px solid currentColor; border-radius:6px; padding:14px 16px; flex:1; backdrop-filter:blur(10px); box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 0 28px rgba(0,0,0,.18); transition:transform .25s,box-shadow .25s; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.025) 0%,transparent 55%); pointer-events:none; }
  .card:hover { transform:translateX(5px) scale(1.008); box-shadow:0 4px 28px currentColor,0 0 55px rgba(0,0,0,.25); }

  .card-content { flex:1; min-width:0; }
  .card-title { font-family:'Orbitron',sans-serif; font-weight:700; font-size:.93rem; color:#fff; margin-bottom:5px; letter-spacing:.4px; line-height:1.3; }
  .card-platform { font-family:'Press Start 2P',monospace; font-size:6px; color:currentColor; opacity:.8; margin-bottom:8px; letter-spacing:.8px; line-height:1.9; }
  .card-desc { font-size:.87rem; line-height:1.65; color:rgba(200,200,230,.73); font-weight:400; }
  .tag { display:inline-block; font-family:'Rajdhani',sans-serif; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:2px 8px; border-radius:2px; margin-top:9px; background:rgba(255,255,255,.05); color:currentColor; border:1px solid rgba(255,255,255,.09); }

  /* COVER IMAGE */
  .card-image { width:90px; flex-shrink:0; border-radius:4px; overflow:hidden; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); aspect-ratio:3/4; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 2px 12px rgba(0,0,0,.5); }
  .card-image img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:3px; opacity:0; transition:opacity .4s; }
  .card-image img.loaded { opacity:1; }
  .img-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(0,0,0,.3)); transition:opacity .4s; }
  .img-placeholder .ph-emoji { font-size:1.5rem; }
  .img-placeholder .ph-text  { font-family:'Press Start 2P',monospace; font-size:5.5px; color:rgba(150,150,200,.45); letter-spacing:1px; text-align:center; line-height:1.9; padding:0 4px; }
  .img-placeholder.hidden { opacity:0; pointer-events:none; }

  /* PROGRESS BAR */
  #img-progress { position:fixed; top:0; left:0; height:2px; background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink)); box-shadow:0 0 8px var(--neon-cyan); transition:width .3s,opacity .6s; z-index:9999; width:0%; }

  /* FOOTER */
  footer { text-align:center; margin-top:80px; padding-top:30px; border-top:1px solid rgba(255,255,255,.05); }
  .footer-pixel { font-family:'Press Start 2P',monospace; font-size:8px; color:rgba(150,150,200,.35); letter-spacing:3px; }
  .footer-pixel span { color:var(--neon-pink); animation:blink 1s step-start infinite; }

  @media(max-width:500px){ .card-image{width:66px} .year-badge{font-size:.62rem} .card-title{font-size:.83rem} }
</style>
</head>

  {year:1990,title:"The Secret of Monkey Island",wiki:"The Secret of Monkey Island",platform:"PC / Amiga / Mac",publisher:"LucasArts",genre:"Point & Click",emoji:"🖱️",desc:"Guybrush Threepwood rêve de devenir le pirate le plus redouté des Caraïbes. Un classique absolu signé LucasArts avec ses duels d'insultes cultes, son humour irrésistible et sa direction artistique intemporelle."},
  {year:1990,title:"ActRaiser",wiki:"ActRaiser",platform:"Super Nintendo",publisher:"Enix",genre:"Action / Simulation",emoji:"⚡",desc:"Hybride unique mêlant action-plateforme et simulation de ville, où vous incarnez un dieu guidant l'évolution de ses fidèles tout en combattant des monstres. Une perle méconnue d'une ambition remarquable pour son époque."},
  {year:1992,title:"Super Mario Land 2: 6 Golden Coins",wiki:"Super Mario Land 2: 6 Golden Coins",platform:"Game Boy",publisher:"Nintendo",genre:"Platformer",emoji:"🦊",desc:"Mario doit récupérer six pièces magiques pour reprendre son château à Wario, ici dans son premier grand rôle. Un jeu Game Boy d'une variété de design et d'une qualité graphique remarquables pour la petite portable de Nintendo."},
  {year:1992,title:"Kirby's Dream Land",wiki:"Kirby's Dream Land",platform:"Game Boy",publisher:"HAL Laboratory / Nintendo",genre:"Platformer",emoji:"🌸",desc:"L'introduction du petit héros rose de HAL Laboratory au grand public. Simple, attachant et plein de personnalité, ce premier épisode Game Boy lance l'une des licences les plus créatives et bienveillantes de Nintendo."},
  {year:1992,title:"EVO: Search for Eden",wiki:"E.V.O.: Search for Eden",platform:"Super Nintendo",publisher:"Enix",genre:"Action-RPG",emoji:"🦕",desc:"Action-RPG unique où l'on guide l'évolution d'une créature à travers les âges préhistoriques, de poisson à reptile à mammifère. Une ambition folle mêlant biologie et fantaisie avec une âme et une originalité incomparables."},
  {year:1993,title:"Day of the Tentacle",wiki:"Day of the Tentacle",platform:"PC / Mac",publisher:"LucasArts",genre:"Point & Click",emoji:"🖱️",desc:"Trois amis naviguent dans le temps pour empêcher un tentacule maléfique de conquérir le monde. Un chef-d'œuvre de l'humour absurde et du design de puzzles, suite directe du cultissime Maniac Mansion de LucasArts."},
  {year:1993,title:"Illusion of Time",wiki:"Illusion of Time",platform:"Super Nintendo",publisher:"Enix",genre:"Action-RPG",emoji:"⚔️",desc:"Will parcourt les grandes civilisations de l'histoire — pyramides d'Égypte, Machu Picchu, Angkor Vat — pour sauver le monde d'une extinction annoncée. Une narration mature et une ambiance envoûtante pour son époque."},
  {year:1994,title:"Theme Park",wiki:"Theme Park (video game)",platform:"PC / SNES / Amiga",publisher:"Bullfrog Productions / EA",genre:"Gestion",emoji:"🎡",desc:"Construisez et gérez un parc d'attractions rentable, des montagnes russes aux stands de restauration. Un jeu de gestion débordant d'humour britannique et de profondeur stratégique, ancêtre direct d'un genre entier."},
  {year:1994,title:"Woodruff and the Schnibble of Azimuth",wiki:"Woodruff and the Schnibble of Azimuth",platform:"PC",publisher:"Coktel Vision / Sierra",genre:"Point & Click",emoji:"🖱️",desc:"Aventure point & click post-apocalyptique absurde et poétique made in France. Woodruff retrouve son père adoptif dans un univers bariolé loufoque, typiquement français dans son humour décalé et son inventivité visuelle."},
  {year:1995,title:"Super Mario World 2: Yoshi's Island",wiki:"Super Mario World 2: Yoshi's Island",platform:"Super Nintendo",publisher:"Nintendo",genre:"Platformer",emoji:"🦕",desc:"Yoshi transporte bébé Mario à travers des niveaux peints à la craie dans un style aquarelle absolument inédit. Un chef-d'œuvre graphique SNES qui s'affranchit de tout ce qui précède avec ses boss mémorables et sa créativité permanente."},
  {year:1995,title:"Rayman",wiki:"Rayman (video game)",platform:"PlayStation / SNES / PC",publisher:"Ubisoft Montpellier",genre:"Platformer",emoji:"🦊",desc:"Premier opus du héros sans membres d'Ubisoft Montpellier. Des mondes oniriques sublimement animés, une bande-son jazzy envoûtante et un level design exigeant en font l'un des platformers 2D les plus ambitieux de sa génération."},
  {year:1995,title:"Chrono Trigger",wiki:"Chrono Trigger",platform:"Super Nintendo",publisher:"Square",genre:"RPG",emoji:"⚔️",desc:"L'un des plus grands RPG de tous les temps, né de la collaboration Toriyama-Horii-Sakaguchi. Voyage dans le temps, système ATB innovant, fins multiples et compositions légendaires de Mitsuda — une œuvre proche de la perfection."},
  {year:1995,title:"Seiken Densetsu 3 / Trials of Mana",wiki:"Trials of Mana",platform:"Super Nintendo",publisher:"Square",genre:"Action-RPG",emoji:"⚔️",desc:"Suite de Secret of Mana avec 6 personnages jouables et 3 storylines distinctes. Un action-RPG vibrant aux graphismes SNES sublimes, injustement resté exclusif au Japon pendant plus de vingt ans avant sa localisation officielle."},
  {year:1995,title:"Front Mission",wiki:"Front Mission (video game)",platform:"Super Nintendo",publisher:"Square",genre:"Tactical RPG",emoji:"🤖",desc:"Tactical RPG dans un futur proche où des mechas géants s'affrontent pour des enjeux géopolitiques complexes. Un scénario politique sophistiqué et un système de personnalisation profond pour une saga culte de Square peu exportée en Occident."},
  {year:1995,title:"Tales of Phantasia",wiki:"Tales of Phantasia",platform:"Super Nintendo",publisher:"Namco",genre:"RPG",emoji:"⚔️",desc:"Le premier Tales of, avec un système de combat en temps réel révolutionnaire pour les RPG japonais de l'époque. Une saga fondatrice qui allie nervosité des affrontements et narration épique dans un univers de fantasy classique."},
  {year:1995,title:"Terranigma",wiki:"Terranigma",platform:"Super Nintendo",publisher:"Enix",genre:"Action-RPG",emoji:"🌍",desc:"Ark ressuscite littéralement la Terre et ses civilisations, de la faune à la flore jusqu'aux humains. Chef-d'œuvre mélancolique sur le cycle de la vie et de la mort, injustement méconnu hors du Japon, clôture magnifique de la trilogie de l'âme d'Enix."},
  {year:1996,title:"Donkey Kong Country 3",wiki:"Donkey Kong Country 3: Dixie Kong's Double Trouble!",platform:"Super Nintendo",publisher:"Rare / Nintendo",genre:"Platformer",emoji:"🦍",desc:"Troisième volet de la trilogie SNES avec Dixie et Kiddy Kong à la rescousse. La technique graphique pré-rendue de Rare reste bluffante et la richesse des niveaux confirme l'excellence d'une série souvent sous-estimée dans ses derniers opus."},

  {year:1997,title:"Age of Empires",wiki:"Age of Empires (video game)",platform:"PC",publisher:"Ensemble Studios / Microsoft",genre:"Stratégie temps réel",emoji:"🏰",desc:"Le RTS historique qui démocratise le genre et façonne une génération entière de joueurs PC. De l'âge de pierre à l'Antiquité, bâtir sa civilisation et mener ses armées à la victoire devient une obsession quasi universelle des années 90."},

  {year:1998,title:"Crash Bandicoot 3: Warped",wiki:"Crash Bandicoot: Warped",platform:"PlayStation",publisher:"Naughty Dog / Sony",genre:"Platformer",emoji:"🦊",desc:"Crash et Coco voyagent dans le temps et débloquent de nouvelles capacités spectaculaires — moto, avion biplan, sous-marin. L'apothéose de la trilogie PS1, avec une générosité de contenu et une variété de gameplay exemplaires."},

/* ── RENDER ── */
function render() {
  const root = document.getElementById('root');
  const decades = [
    { label:'1990s', range:[1990,2000] },
    { label:'2000s', range:[2000,2010] },
    { label:'2010s', range:[2010,2020] }
  ];
  decades.forEach(dec => {
    const [from,to] = dec.range;
    const group = GAMES.filter(g => g.year >= from && g.year < to);
    if (!group.length) return;
    const sep = document.createElement('div');
    sep.className = 'decade-sep';
    sep.innerHTML = `<span class="decade-label">// ${dec.label}</span>`;
    root.appendChild(sep);
    const tl = document.createElement('div');
    tl.className = 'timeline';
    group.forEach((g,i) => {
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `
        <span class="year-badge">${g.year}</span>
        <div class="card">
          <div class="card-content">
            <div class="card-title">${g.title}</div>
            <div class="card-platform">${g.platform} &nbsp;·&nbsp; ${g.publisher}</div>
            <div class="card-desc">${g.desc}</div>
            <span class="tag">${g.genre}</span>
          </div>
          <div class="card-image">
            <div class="img-placeholder" id="ph-${dec.label}-${i}">
              <span class="ph-emoji">${g.emoji}</span>
              <span class="ph-text">chargement<br>image…</span>
            </div>
            <img
              id="ci-${dec.label}-${i}"
              alt="${g.title}"
              loading="lazy"
              data-wiki="${g.wiki}"
              data-idx="${dec.label}-${i}"
            />
          </div>
        </div>`;
      tl.appendChild(entry);
    });
    root.appendChild(tl);
  });
}

/* ── INTERSECTION OBSERVER ── */
function initObserver() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold:0.07 });
  document.querySelectorAll('.entry').forEach(el => io.observe(el));
}

/* ── WIKIPEDIA IMAGES ── */
async function fetchImages() {
  const imgs   = Array.from(document.querySelectorAll('img[data-wiki]'));
  const bar    = document.getElementById('img-progress');
  let loaded   = 0;
  const total  = imgs.length;

  // wikiTitle → img element
  const map = {};
  imgs.forEach(img => { map[img.dataset.wiki] = img; });

  const BATCH = 50;
  const titles = imgs.map(i => i.dataset.wiki);

  for(let i = 0; i < titles.length; i += BATCH) {
    const batch = titles.slice(i, i+BATCH);
    const param = batch.map(t => encodeURIComponent(t)).join('|');
    const url   = `https://en.wikipedia.org/w/api.php?action=query&titles=${param}&prop=pageimages&format=json&pithumbsize=200&origin=*`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      const pages = data.query?.pages || {};

      // Build normalization map
      const norm = {};
      (data.query?.normalized || []).forEach(n => { norm[n.to] = n.from; });
      (data.query?.redirects  || []).forEach(r => { norm[r.to] = norm[r.from] || r.from; });

      Object.values(pages).forEach(page => {
        if(!page.thumbnail) { loaded++; bar.style.width=Math.round((loaded/total)*100)+'%'; return; }
        let imgEl = map[page.title];
        if(!imgEl){ const orig = norm[page.title]; if(orig) imgEl = map[orig]; }
        if(!imgEl) return;
        imgEl.src = page.thumbnail.source;
        imgEl.onload = () => {
          imgEl.classList.add('loaded');
          const ph = imgEl.previousElementSibling;
          if(ph) ph.classList.add('hidden');
          loaded++;
          bar.style.width = Math.round((loaded/total)*100)+'%';
          if(loaded>=total) setTimeout(()=>{ bar.style.opacity='0'; },900);
        };
        imgEl.onerror = () => { loaded++; bar.style.width=Math.round((loaded/total)*100)+'%'; };
      });
    } catch(e) { console.warn('Wikipedia fetch error:', e); }
  }
}

render();
initObserver();
fetchImages();
</script>
