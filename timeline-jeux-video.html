<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frise Chronologique — Jeux Vidéo 1990–2020</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="img-progress"></div>

  <!-- MODAL -->
  <div id="modal" role="dialog" aria-modal="true" aria-label="Image agrandie">
    <div id="modal-inner">
      <button id="modal-close" aria-label="Fermer">✕</button>
      <div id="modal-img-wrap">
        <img id="modal-img" src="" alt="" />
      </div>
      <div id="modal-caption">
        <div id="modal-title"></div>
        <div id="modal-year"></div>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <header>
      <p class="header-tag">▶ INSERT COIN TO START ◀</p>
      <h1>MON HISTOIRE DES<br>JEUX VIDÉO</h1>
      <p class="subtitle">1990 — 2020 &nbsp;·&nbsp; 30 ans d'épopée</p>
      <div class="header-line"></div>
      <p class="game-count" id="game-count"></p>
    </header>

    <!-- FILTER BAR -->
    <div id="filter-bar">
      <button class="filter-btn active" data-top="0">✦ TOUS</button>
      <button class="filter-btn" data-top="50">50</button>
      <button class="filter-btn" data-top="20">20</button>
      <button class="filter-btn" data-top="10">10</button>
      <button class="filter-btn" data-top="5">5</button>
    </div>

    <div id="root"></div>
    <div id="carousel-view"></div>
    <footer><p class="footer-pixel">GAME OVER &nbsp;·&nbsp; <span>▮</span> &nbsp;·&nbsp; CONTINUE ?</p></footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
