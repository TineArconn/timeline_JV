<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frise Chronologique — Jeux Vidéo 1990–2020</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --neon-purple: #b400ff;
    --dark-bg: #050510;
    --card-bg: rgba(10,10,35,0.88);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background-color: var(--dark-bg);
    font-family: 'Rajdhani', sans-serif;
    color: #e0e0ff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 8%  12%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 55%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 28%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 75%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 42%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 38%, rgba(0,245,255,.3)  0%, transparent 100%),
      radial-gradient(2px 2px at 55% 65%, rgba(180,0,255,.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 92%  8%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 88%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 70%, rgba(255,230,0,.2)  0%, transparent 100%);
    background-size: 700px 700px; pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
    pointer-events:none; z-index:1;
  }

  .wrapper { position:relative; z-index:2; max-width:960px; margin:0 auto; padding:60px 20px 100px; }

  /* HEADER */
  header { text-align:center; margin-bottom:80px; }
  .header-tag { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--neon-cyan); letter-spacing:4px; margin-bottom:20px; animation:blink 1.4s step-start infinite; }
  @keyframes blink { 50%{opacity:0} }
  h1 { font-family:'Orbitron',sans-serif; font-weight:900; font-size:clamp(1.9rem,6vw,4rem); line-height:1.1; letter-spacing:-1px; background:linear-gradient(135deg,var(--neon-cyan) 0%,var(--neon-pink) 55%,var(--neon-yellow) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 28px rgba(0,245,255,.4)); margin-bottom:14px; }
  .subtitle { font-size:1rem; font-weight:600; color:rgba(200,200,255,.55); letter-spacing:6px; text-transform:uppercase; }
  .header-line { margin-top:28px; height:2px; background:linear-gradient(90deg,transparent,var(--neon-cyan),var(--neon-pink),transparent); box-shadow:0 0 12px var(--neon-cyan); }
  .game-count { margin-top:14px; font-family:'Press Start 2P',monospace; font-size:7px; color:rgba(150,150,200,.5); letter-spacing:2px; }

  /* DECADE */
  .decade-sep { position:relative; display:flex; align-items:center; margin:70px 0 44px -60px; padding-left:60px; }
  .decade-sep::before { content:''; position:absolute; left:11px; width:21px; height:21px; border-radius:50%; background:var(--neon-yellow); box-shadow:0 0 22px var(--neon-yellow),0 0 44px rgba(255,230,0,.28); z-index:2; }
  .decade-label { font-family:'Press Start 2P',monospace; font-size:18px; color:var(--neon-yellow); letter-spacing:3px; text-shadow:0 0 20px var(--neon-yellow); padding:8px 20px; border:2px solid rgba(255,230,0,.35); background:rgba(255,230,0,.05); border-radius:4px; backdrop-filter:blur(4px); }

  /* SPINE */
  .timeline { position:relative; padding-left:60px; }
  .timeline::before { content:''; position:absolute; left:20px; top:0; bottom:0; width:3px; background:linear-gradient(to bottom,var(--neon-cyan),var(--neon-purple),var(--neon-pink),var(--neon-yellow),var(--neon-green),var(--neon-cyan)); box-shadow:0 0 14px rgba(0,245,255,.45); border-radius:2px; }

  /* ENTRY */
  .entry { position:relative; display:flex; align-items:flex-start; margin-bottom:26px; opacity:0; transform:translateX(-18px); transition:opacity .45s ease,transform .45s ease; }
  .entry.visible { opacity:1; transform:translateX(0); }
  .entry::before { content:''; position:absolute; left:-48px; top:17px; width:13px; height:13px; border-radius:50%; border:2px solid currentColor; background:var(--dark-bg); z-index:2; transition:transform .2s,box-shadow .2s; }
  .entry::after  { content:''; position:absolute; left:-35px; top:23px; width:35px; height:2px; background:currentColor; opacity:.35; }
  .entry:hover::before { transform:scale(1.7); box-shadow:0 0 8px currentColor; }
  .entry:nth-child(6n+1) { color:var(--neon-cyan);   }
  .entry:nth-child(6n+2) { color:var(--neon-pink);   }
  .entry:nth-child(6n+3) { color:var(--neon-green);  }
  .entry:nth-child(6n+4) { color:var(--neon-purple); }
  .entry:nth-child(6n+5) { color:var(--neon-yellow); }
  .entry:nth-child(6n+6) { color:var(--neon-cyan);   }

  .year-badge { font-family:'Orbitron',sans-serif; font-weight:700; font-size:.72rem; color:inherit; background:rgba(0,0,0,.5); border:1px solid currentColor; border-radius:3px; padding:3px 8px; white-space:nowrap; margin-right:14px; margin-top:13px; box-shadow:0 0 7px currentColor; flex-shrink:0; letter-spacing:1px; }

  /* CARD */
  .card { display:flex; gap:14px; align-items:flex-start; background:var(--card-bg); border:1px solid rgba(255,255,255,.06); border-left:3px solid currentColor; border-radius:6px; padding:14px 16px; flex:1; backdrop-filter:blur(10px); box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 0 28px rgba(0,0,0,.18); transition:transform .25s,box-shadow .25s; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.025) 0%,transparent 55%); pointer-events:none; }
  .card:hover { transform:translateX(5px) scale(1.008); box-shadow:0 4px 28px currentColor,0 0 55px rgba(0,0,0,.25); }

  .card-content { flex:1; min-width:0; }
  .card-title { font-family:'Orbitron',sans-serif; font-weight:700; font-size:.93rem; color:#fff; margin-bottom:5px; letter-spacing:.4px; line-height:1.3; }
  .card-platform { font-family:'Press Start 2P',monospace; font-size:6px; color:currentColor; opacity:.8; margin-bottom:8px; letter-spacing:.8px; line-height:1.9; }
  .card-desc { font-size:.87rem; line-height:1.65; color:rgba(200,200,230,.73); font-weight:400; }
  .tag { display:inline-block; font-family:'Rajdhani',sans-serif; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; padding:2px 8px; border-radius:2px; margin-top:9px; background:rgba(255,255,255,.05); color:currentColor; border:1px solid rgba(255,255,255,.09); }

  /* COVER IMAGE */
  .card-image { width:90px; flex-shrink:0; border-radius:4px; overflow:hidden; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); aspect-ratio:3/4; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 2px 12px rgba(0,0,0,.5); }
  .card-image img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:3px; opacity:0; transition:opacity .4s; }
  .card-image img.loaded { opacity:1; }
  .img-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(0,0,0,.3)); transition:opacity .4s; }
  .img-placeholder .ph-emoji { font-size:1.5rem; }
  .img-placeholder .ph-text  { font-family:'Press Start 2P',monospace; font-size:5.5px; color:rgba(150,150,200,.45); letter-spacing:1px; text-align:center; line-height:1.9; padding:0 4px; }
  .img-placeholder.hidden { opacity:0; pointer-events:none; }

  /* PROGRESS BAR */
  #img-progress { position:fixed; top:0; left:0; height:2px; background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink)); box-shadow:0 0 8px var(--neon-cyan); transition:width .3s,opacity .6s; z-index:9999; width:0%; }

  /* FOOTER */
  footer { text-align:center; margin-top:80px; padding-top:30px; border-top:1px solid rgba(255,255,255,.05); }
  .footer-pixel { font-family:'Press Start 2P',monospace; font-size:8px; color:rgba(150,150,200,.35); letter-spacing:3px; }
  .footer-pixel span { color:var(--neon-pink); animation:blink 1s step-start infinite; }

  @media(max-width:500px){ .card-image{width:66px} .year-badge{font-size:.62rem} .card-title{font-size:.83rem} }

  /* ── MODAL ── */
  #modal {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(2, 2, 18, 0.92);
    backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  #modal.open { opacity: 1; pointer-events: all; }

  #modal-inner {
    position: relative;
    max-width: min(520px, 90vw);
    width: 100%;
    transform: scale(.88) translateY(20px);
    transition: transform .35s cubic-bezier(.22,1,.36,1);
  }
  #modal.open #modal-inner { transform: scale(1) translateY(0); }

  #modal-img-wrap {
    border-radius: 8px; overflow: hidden;
    border: 2px solid rgba(255,255,255,.1);
    box-shadow: 0 0 60px rgba(0,245,255,.2), 0 0 120px rgba(180,0,255,.1), 0 24px 60px rgba(0,0,0,.7);
    background: rgba(10,10,35,.9);
    line-height: 0;
  }
  #modal-img {
    width: 100%; display: block;
    max-height: 72vh; object-fit: contain;
    border-radius: 6px;
  }

  #modal-caption {
    margin-top: 16px; text-align: center; padding: 0 8px;
  }
  #modal-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700; font-size: 1rem;
    color: #fff; letter-spacing: .5px;
    margin-bottom: 4px;
  }
  #modal-year {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; color: var(--neon-cyan);
    opacity: .8; letter-spacing: 2px;
  }

  /* Neon border glow that cycles colour */
  #modal-img-wrap {
    animation: none;
  }
  #modal.open #modal-img-wrap {
    animation: modal-glow 3s ease-in-out infinite alternate;
  }
  @keyframes modal-glow {
    0%   { box-shadow: 0 0 40px rgba(0,245,255,.25),  0 24px 60px rgba(0,0,0,.7); border-color: rgba(0,245,255,.3);  }
    50%  { box-shadow: 0 0 40px rgba(180,0,255,.25),  0 24px 60px rgba(0,0,0,.7); border-color: rgba(180,0,255,.3);  }
    100% { box-shadow: 0 0 40px rgba(255,45,120,.25), 0 24px 60px rgba(0,0,0,.7); border-color: rgba(255,45,120,.3); }
  }

  /* Close button */
  #modal-close {
    position: absolute; top: -14px; right: -14px;
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--dark-bg);
    border: 2px solid rgba(255,255,255,.15);
    color: rgba(200,200,255,.7);
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, color .2s, transform .2s;
    z-index: 1;
  }
  #modal-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); transform: scale(1.15) rotate(90deg); }

  /* Make card-image show a zoom cursor */
  .card-image { cursor: zoom-in; }
</style>
</head>

    <div id="modal-caption">

      <div id="modal-year"></div>

</div>

  { year:1997, slug:"age-of-empires",                                    title:"Age of Empires",                                  platform:"PC",                         publisher:"Ensemble Studios / Microsoft",     genre:"Stratégie temps réel",emoji:"🏰", desc:"Le RTS historique qui démocratise le genre et façonne une génération entière de joueurs PC. De l'âge de pierre à l'Antiquité, bâtir sa civilisation et mener ses armées à la victoire devient une obsession." },
  { year:1997, slug:"crash-bandicoot-2",                                 title:"Crash Bandicoot 2: Cortex Strikes Back",          platform:"PlayStation",                publisher:"Naughty Dog / Sony",               genre:"Platformer",          emoji:"🦊", desc:"La série atteint sa pleine maturité avec des niveaux thématiques variés — arctique, égout, espace — et une maniabilité affinée. Crash s'impose comme la mascotte incontestée de la PlayStation originale." },
  { year:1997, slug:"oddworld-abes-oddysee",                             title:"Oddworld: Abe's Oddysee",                         platform:"PlayStation / PC",           publisher:"Oddworld Inhabitants / GT Interactive", genre:"Platformer",     emoji:"👾", desc:"Abe, esclave moudar dans une usine de viande, s'échappe et tente de sauver ses 99 congénères. Platformer sombre et satirique, critique du capitalisme industriel, avec un gameplay de possession mentale unique." },
  { year:1997, slug:"theme-hospital",                                    title:"Theme Hospital",                                  platform:"PC",                         publisher:"Bullfrog Productions / EA",        genre:"Gestion",            emoji:"🏥", desc:"Gérez un hôpital peuplé de maladies absurdes — crâne gonflé, faux docteur, syndrome de la langue de bois. L'humour britannique décapant de Bullfrog en fait un jeu de gestion culte et toujours aussi savoureux." },
  // ── 1998 ──
  { year:1998, slug:"the-legend-of-zelda-links-awakening-dx",            title:"The Legend of Zelda: Link's Awakening DX",        platform:"Game Boy Color",             publisher:"Nintendo",                         genre:"Action-Aventure",    emoji:"🗡️", desc:"Link naufragé sur l'île mystérieuse de Cocolint doit réveiller le Poisson-Vent. Un Zelda atypique, mélancolique et poétique, avec une conclusion émotionnelle inattendue et des emprunts savoureux à d'autres licences." },
  { year:1998, slug:"suikoden-ii-2014",                                  title:"Suikoden II",                                     platform:"PlayStation",                publisher:"Konami",                           genre:"RPG",                 emoji:"⚔️", desc:"RPG PS1 d'une richesse scénaristique bouleversante avec 108 personnages recrutables. Une histoire de guerre, de trahison et d'amitié brisée d'une intensité rare dans le médium, encore adulée des décennies plus tard." },
  { year:1998, slug:"crash-bandicoot-warped",                            title:"Crash Bandicoot 3: Warped",                       platform:"PlayStation",                publisher:"Naughty Dog / Sony",               genre:"Platformer",          emoji:"🦊", desc:"Crash et Coco voyagent dans le temps et débloquent de nouvelles capacités spectaculaires — moto, avion biplan, sous-marin. L'apothéose de la trilogie PS1, avec une générosité de contenu exemplaire." },
  { year:1998, slug:"medievil",                                          title:"MediEvil",                                        platform:"PlayStation",                publisher:"SCE Cambridge Studio / Sony",      genre:"Action-Aventure",    emoji:"💀", desc:"Sir Daniel Fortesque, chevalier lâche ressuscité par accident, doit sauver le royaume de Gallowmere. Une aventure gothique et humoristique, exclusive PlayStation d'un charme noir irrésistible." },
  { year:1998, slug:"the-settlers-3",                                    title:"The Settlers III",                                platform:"PC",                         publisher:"Blue Byte",                        genre:"Stratégie / Gestion", emoji:"🏗️", desc:"Troisième opus de la saga de colonisation Blue Byte. Construire des chaînes de production complexes et mener ses armées à la conquête d'îles colorées — un équilibre parfait entre détente et stratégie." },
  { year:1998, slug:"populous-the-beginning",                            title:"Populous: The Beginning",                         platform:"PC",                         publisher:"Bullfrog Productions / EA",        genre:"God Game",           emoji:"⚡", desc:"Troisième volet 3D de la saga god game de Bullfrog. Vous incarnez une chamane qui guide sa tribu à conquérir des planètes grâce à un arsenal de sortilèges divins dévastateurs — tornade, volcan, tremblement de terre." },
  // ── 1999 ──
  { year:1999, slug:"heroes-of-might-and-magic-3-the-restoration-of-era", title:"Heroes of Might and Magic III",                  platform:"PC",                         publisher:"New World Computing / 3DO",        genre:"Tour par tour",       emoji:"♟️", desc:"Le sommet absolu de la saga HoMM, encore joué compétitivement vingt-cinq ans après sa sortie. Exploration de cartes gigantesques, recrutement de créatures légendaires et sièges de châteaux en heroic fantasy." },
  { year:1999, slug:"chrono-cross-2011",                                 title:"Chrono Cross",                                    platform:"PlayStation",                publisher:"Square",                           genre:"RPG",                 emoji:"⚔️", desc:"Suite spirituelle de Chrono Trigger dans un univers de mondes parallèles avec 45 personnages jouables. Une bande-son magistrale de Mitsuda et un système de combat en éléments chromatiques composent une œuvre fascinante." },
  { year:1999, slug:"metal-gear-solid-vr-missions",                      title:"Metal Gear Solid: VR Missions",                   platform:"PlayStation",                publisher:"Konami",                           genre:"Action Furtive",      emoji:"👁️", desc:"Extension de MGS avec plus de 300 missions de simulation virtuelle pour Solid Snake. Un bac à sable d'entraînement qui approfondit toutes les mécaniques de furtivité dans des décors polygonaux hypnotiques." },
  { year:1999, slug:"civilization-call-to-power",                        title:"Civilization: Call to Power",                     platform:"PC",                         publisher:"Activision",                       genre:"4X / Tour par tour",  emoji:"🌍", desc:"Spin-off de la saga Civilization guide une civilisation de l'Antiquité jusqu'au futur lointain, avec des ères science-fiction inédites incluant la conquête spatiale et les fonds marins." },
  { year:1999, slug:"worms-armageddon",                                  title:"Worms Armageddon",                                platform:"PC / PlayStation / N64 / DC", publisher:"Team17",                           genre:"Stratégie / Artillerie",emoji:"💣", desc:"Le sommet absolu de la saga Worms, avec ses centaines d'armes absurdes et son humour britannique irrésistible. Dix modes de jeu, un éditeur de niveaux et un multijoueur dévastateur qui réunit encore des communautés entières." },
  // ── 2000 ──
  { year:2000, slug:"zeus-master-of-olympus",                            title:"Zeus: Master of Olympus",                         platform:"PC",                         publisher:"Impressions Games / Sierra",       genre:"City Builder",        emoji:"🏛️", desc:"City builder mythologique dans la Grèce antique. Construisez des cités florissantes, apaisez les dieux de l'Olympe et repoussez les monstres légendaires dans ce titre d'une richesse culturelle sincère." },
  { year:2000, slug:"final-fantasy-ix",                                  title:"Final Fantasy IX",                                platform:"PlayStation",                publisher:"Square",                           genre:"RPG",                 emoji:"⚔️", desc:"Retour aux sources médiévales-fantastiques de la saga après les opus futuristes. Zidane, Garnet et Vivi vivent une aventure nostalgique et profondément émouvante — un amour déclaré aux RPG japonais classiques." },
  { year:2000, slug:"command-conquer-red-alert-2",                       title:"Command & Conquer: Red Alert 2",                  platform:"PC",                         publisher:"Westwood Studios / EA",            genre:"Stratégie temps réel",emoji:"🏰", desc:"Uchronie de la Guerre Froide où l'URSS envahit les États-Unis avec des esprits contrôlés et des téléporteurs. STR nerveux et charismatique de Westwood avec des cinématiques live-action mémorables." },
  // ── 2001 ──
  { year:2001, slug:"phoenix-wright-ace-attorney-2001",                  title:"Phoenix Wright: Ace Attorney",                    platform:"Game Boy Advance",           publisher:"Capcom",                           genre:"Visual Novel",        emoji:"⚖️", desc:"Naruhodō Ryūichi, avocat maladroit, défend des accusés innocents dans des procès absurdes et dramatiques. Les OBJECTION ! retentissants, l'écriture savoureuse et les twists judiciaires en font une série unique." },
  { year:2001, slug:"max-payne",                                         title:"Max Payne",                                       platform:"PC / PS2 / Xbox",            publisher:"Remedy Entertainment / 3D Realms", genre:"TPS",                emoji:"🔫", desc:"Flic en cavale dans New York sous la neige, Max Payne popularise le bullet time et la narration en roman noir graphique. Remedy livre un shooter atmosphérique d'une intensité dramatique saisissante, hommage au cinéma hard-boiled." },
  { year:2001, slug:"commandos-2-men-of-courage",                        title:"Commandos 2: Men of Courage",                     platform:"PC",                         publisher:"Pyro Studios / Eidos",             genre:"Tactique",           emoji:"🪖", desc:"Six commandos aux compétences complémentaires infiltrent des bases ennemies dans des environnements en 3D isométrique. Pyro Studios signe le sommet de la série avec une richesse de missions et de possibilités tactiques inégalées." },
  { year:2001, slug:"arcanum-of-steamworks-and-magick-obscura",          title:"Arcanum: Of Steamworks and Magick Obscura",       platform:"PC",                         publisher:"Troika Games / Sierra",            genre:"RPG",                emoji:"⚙️", desc:"Un monde steampunk où magie et technologie industrielle s'affrontent. RPG isométrique de Troika d'une liberté narrative vertigineuse — race, classe, réputation et compétences techniques ou magiques recomposent entièrement l'expérience." },
  { year:2001, slug:"golden-sun",                                         title:"Golden Sun",                                      platform:"Game Boy Advance",           publisher:"Camelot / Nintendo",               genre:"RPG",                 emoji:"☀️", desc:"Isaac et ses compagnons Psynergistes partent empêcher l'allumage des quatre phares d'Alchemy dans un monde de fantasy coloré. RPG GBA de Camelot aux puzzles environnementaux ingénieux et aux combats riches, vitrine technique absolue de la portable." },
  { year:2001, slug:"baldurs-gate-dark-alliance",                         title:"Baldur's Gate: Dark Alliance",                    platform:"PS2 / Xbox / GameCube",      publisher:"Snowblind Studios / Interplay",    genre:"Action-RPG",          emoji:"⚔️", desc:"Hack-and-slash dans les Royaumes Oubliés pour trois héros qui démantèlent une alliance criminelle à Baldur's Gate. Snowblind livre un dungeon crawler fluide et spectaculaire, pionnier du genre sur consoles, avec un mode coopératif particulièrement addictif." },
  // ── 2002 ──
  { year:2002, slug:"dark-cloud-2",                                      title:"Dark Chronicle",                                  platform:"PlayStation 2",              publisher:"Level-5 / Sony",                   genre:"Action-RPG",          emoji:"⚔️", desc:"Monica et Max voyagent dans le temps pour reconstruire un monde détruit, en combinant dungeon crawling et construction de villes. Un jeu généreux et touchant — vitrine de l'excellence naissante de Level-5." },
  { year:2002, slug:"warcraft-3-reign-of-chaos",                         title:"Warcraft III: Reign of Chaos",                    platform:"PC / Mac",                   publisher:"Blizzard Entertainment",           genre:"Stratégie temps réel",emoji:"🏰", desc:"Révolutionne le RTS avec ses héros et ses éléments RPG profonds. Son éditeur donne naissance au genre MOBA via DotA — l'une des influences les plus durables et imprévisibles de l'histoire du jeu vidéo." },
  { year:2002, slug:"age-of-mythology",                                  title:"Age of Mythology",                                platform:"PC",                         publisher:"Ensemble Studios / Microsoft",     genre:"Stratégie temps réel",emoji:"⚡", desc:"Spin-off fantastique d'Age of Empires intégrant les panthéons grec, nordique et égyptien. Pouvoirs divins et créatures mythologiques insufflent une épopée légendaire à la formule RTS bien rodée." },
  { year:2002, slug:"metroid-fusion",                                    title:"Metroid Fusion",                                  platform:"Game Boy Advance",           publisher:"Nintendo",                         genre:"Metroidvania",        emoji:"🪐", desc:"Samus, infectée par le parasite X, explore la station BSL sous la menace d'une version d'elle-même corrompue — le SA-X. Metroidvania GBA d'une tension et d'une atmosphère oppressantes exemplaires, avec un scénario nettement plus narratif que ses prédécesseurs." },                                           
  { year:2002, slug:"syberia",                                           title:"Syberia",                                         platform:"PC / Mac",                   publisher:"Microïds / Benoît Sokal",          genre:"Point & Click",      emoji:"🚂", desc:"Kate Walker part en mission commerciale et se retrouve embarquée dans un voyage onirique à travers une Europe de l'Est steampunk. Une œuvre graphiquement sublime signée Benoît Sokal, avec des automates d'une poésie unique." },
  // ── 2003 ──
  { year:2003, slug:"zoo-tycoon-2001",                                   title:"Zoo Tycoon: Complete Collection",                  platform:"PC",                         publisher:"Blue Fang Games / Microsoft",      genre:"Gestion",            emoji:"🦁", desc:"Gérez un zoo avec des centaines d'espèces animales dans des habitats sur mesure. Blue Fang crée un jeu de simulation accessible et éducatif, véritable bac à sable créatif pour amoureux des animaux." },
  { year:2003, slug:"castlevania-aria-of-sorrow-2",                      title:"Castlevania: Aria of Sorrow",                     platform:"Game Boy Advance",           publisher:"Konami",                           genre:"Metroidvania",        emoji:"🏰", desc:"Soma Cruz découvre qu'il est la réincarnation de Dracula dans un château bloqué dans le futur. L'apogée de la formule Metroidvania sur GBA grâce au Tactical Soul — absorber les pouvoirs ennemis." },
  { year:2003, slug:"beyond-good-evil",                                  title:"Beyond Good & Evil",                              platform:"PS2 / GameCube / Xbox / PC", publisher:"Ubisoft Montpellier",              genre:"Action-Aventure",    emoji:"📷", desc:"Jade, reporter-photographe et combattante, enquête sur une invasion extraterrestre dissimulée par le gouvernement. Jeu culte de Michel Ancel mêlant aventure, infiltration et photographie dans un univers SF vibrant." },
  { year:2003, slug:"xiii",                                              title:"XIII",                                            platform:"PS2 / Xbox / GameCube / PC", publisher:"Ubisoft",                          genre:"FPS",                 emoji:"🔫", desc:"FPS à l'esthétique bande dessinée où un amnésique découvre son passé d'assassin au cœur d'une conspiration présidentielle. Les onomatopées visuelles et son adaptation de la BD de Van Hamme en font un ovni PS2." },
  { year:2003, slug:"final-fantasy-tactics-advance",                      title:"Final Fantasy Tactics Advance",                   platform:"Game Boy Advance",           publisher:"Square Enix",                      genre:"Tactical RPG",        emoji:"⚔️", desc:"Marche et ses amis sont aspirés dans le monde d'Ivalice, univers fait de règles et de lois à respecter sous peine de prison. Tactical RPG GBA d'une profondeur de gameplay et d'un système de jobs remarquables, à la fois accessible et très riche." },
  // ── 2004 ──
  { year:2004, slug:"dragon-quest-viii",                                 title:"Dragon Quest VIII",                               platform:"PlayStation 2",              publisher:"Level-5 / Square Enix",            genre:"RPG",                 emoji:"⚔️", desc:"Premier opus PS2 du monument japonais avec un cel-shading lumineux révélant un monde immense signé Level-5. Yangus, Angelo et Jessica accompagnent le héros silencieux dans une aventure épique mémorable." },
  { year:2004, slug:"sly-2-band-of-thieves",                             title:"Sly 2: Band of Thieves",                          platform:"PlayStation 2",              publisher:"Sucker Punch / Sony",              genre:"Platformer",          emoji:"🎭", desc:"Sly Cooper et sa bande démantèlent le KLAWW Gang pour récupérer les pièces d'un automate diabolique. Plus ambitieux que son prédécesseur, il brille par son humour, sa générosité et l'alchimie de ses trois héros." },
  { year:2004, slug:"the-lord-of-the-rings-the-battle-for-middle-earth",  title:"The Lord of the Rings: The Battle for Middle-earth", platform:"PC",                       publisher:"EA Games",                         genre:"Stratégie temps réel", emoji:"🏰", desc:"Revivez les batailles épiques de la trilogie Jackson en commandant les armées du Bien ou du Mal sur les champs d'Arda. RTS accessible et spectaculaire d'EA, avec des unités héroïques emblématiques et des assauts de Minas Tirith ou du Gouffre de Helm mémorables." },               
  { year:2004, slug:"prince-of-persia-the-sands-of-time",                title:"Prince of Persia: The Sands of Time",             platform:"PS2 / Xbox / GameCube / PC", publisher:"Ubisoft Montréal",                 genre:"Action-Aventure",    emoji:"⏳", desc:"Le Prince manipule le temps pour corriger ses erreurs dans un palais envahi de créatures de sable. Reboot magistral d'Ubisoft Montréal qui réinvente l'action-aventure avec une fluidité acrobatique et un charme narratif inégalé." },
  { year:2004, slug:"atelier-iris-eternal-mana",                         title:"Atelier Iris: Eternal Mana",                      platform:"PlayStation 2",              publisher:"Gust / NIS America",               genre:"RPG",                emoji:"⚗️", desc:"Klein l'alchimiste part à la recherche des esprits Mana pour maîtriser l'alchimie ultime. Première incursion de la saga Atelier hors du Japon, avec son système de crafting d'objets profond et une atmosphère de conte lumineux et paisible." },
  { year:2004, slug:"gurumin-a-monstrous-adventure",                     title:"Gurumin: A Monstrous Adventure",                  platform:"PC / PSP",                   publisher:"Nihon Falcom",                     genre:"Action-RPG",         emoji:"⛏️", desc:"Parin et sa perceuse géante défendent le village fantôme de ses amis monstres contre les esprits maléfiques. Action-RPG coloré et exubérant de Falcom, aussi accessible qu'addictif, avec un level design soigné et une bande-son énergique." },
  // ── 2005 ──
  { year:2005, slug:"shadow-of-the-colossus",                            title:"Shadow of the Colossus",                          platform:"PlayStation 2",              publisher:"Team Ico / Sony",                  genre:"Action-Aventure",    emoji:"🗡️", desc:"Wander affronte seize colosses monumentaux pour ressusciter une jeune femme. Sans HUD, sans ennemis communs — un poème visuel et émotionnel de Fumito Ueda qui prouve que les jeux vidéo peuvent être de l'art." },
  { year:2005, slug:"the-movies",                                        title:"The Movies",                                      platform:"PC",                         publisher:"Lionhead Studios / Activision",    genre:"Simulation",          emoji:"🎬", desc:"Simulateur de studio hollywoodien de Peter Molyneux. Gérez acteurs, réalisateurs et plateaux de l'ère du muet au blockbuster moderne, tout en tournant vos propres films grâce à un éditeur créatif addictif." },
  // ── 2006 ──
  { year:2006, slug:"okami",                                             title:"Ōkami",                                           platform:"PlayStation 2",              publisher:"Clover Studio / Capcom",           genre:"Action-Aventure",    emoji:"🌸", desc:"Amaterasu, déesse-loup blanche, restaure la nature dévastée à coups de pinceau divin. Chef-d'œuvre visuel inspiré des estampes ukiyo-e et de Zelda — le Celestial Brush comme mécanique centrale d'une poésie incomparable." },
  { year:2006, slug:"company-of-heroes",                                 title:"Company of Heroes",                               platform:"PC",                         publisher:"Relic Entertainment / THQ",        genre:"Stratégie temps réel",emoji:"🪖", desc:"RTS tactique ancré dans le débarquement en Normandie, avec une physique destructible révolutionnaire et une gestion des unités d'une profondeur inédite. Considéré par beaucoup comme le meilleur RTS jamais conçu." },
  { year:2006, slug:"titan-quest",                                       title:"Titan Quest",                                     platform:"PC",                         publisher:"Iron Lore Entertainment / THQ",    genre:"Action-RPG",         emoji:"⚡", desc:"Hack-and-slash dans la Grèce antique, l'Égypte et la Chine mythologiques face aux Titans déchaînés. Concurrent direct de Diablo II, Titan Quest s'impose par sa richesse culturelle, ses classes hybrides et son atmosphère somptueuse." },
  // ── 2008 ──
  { year:2008, slug:"spore",                                             title:"Spore",                                           platform:"PC / Mac",                   publisher:"Maxis / EA",                       genre:"Simulation / Dieu",  emoji:"🦠", desc:"Guidez une créature de cellule unicellulaire jusqu'à la conquête spatiale à travers cinq phases d'évolution distinctes. La vision de Will Wright pour un jeu de création infini — ambitieux, créatif et débordant de possibilités de personnalisation." },
  { year:2008, slug:"the-last-remnant",                                  title:"The Last Remnant",                                platform:"PC / Xbox 360",              publisher:"Square Enix",                      genre:"RPG",                emoji:"⚔️", desc:"Rush Sykes part à la rescousse de sa sœur dans un monde dominé par d'énigmatiques artéfacts appelés Remnants. RPG de Square Enix au système de batailles en formations d'unités atypique et ambitieux, avec un lore d'une richesse considérable." },
  // ── 2009 ──
  { year:2009, slug:"dragon-age-origins",                                title:"Dragon Age: Origins",                             platform:"PC / PS3 / Xbox 360",        publisher:"BioWare / EA",                     genre:"RPG tactique",        emoji:"🛡️", desc:"RPG tactique de BioWare avec six origines jouables distinctes. Un monde de heroic fantasy sombre, des choix moraux aux conséquences durables et un niveau d'écriture exceptionnel pour les compagnons et la politique du royaume." },
  // ── 2010 ──
  { year:2010, slug:"xenoblade-chronicles",                              title:"Xenoblade Chronicles",                            platform:"Wii",                        publisher:"Monolith Soft / Nintendo",         genre:"RPG",                 emoji:"⚔️", desc:"Shulk armé du Monado affronte les Mechon sur le dos de deux titans pétrifiés depuis l'aube des temps. RPG d'une ambition narrative rare, avec un monde ouvert saisissant et la bande-son magistrale de Yoko Shimomura." },
  { year:2010, slug:"vvvvvv",                                            title:"VVVVVV",                                          platform:"PC / Mac / 3DS",             publisher:"Terry Cavanagh",                   genre:"Platformer",         emoji:"🔄", desc:"Captain Viridian ne peut pas sauter — il inverse la gravité. Platformer minimaliste de Terry Cavanagh d'une difficulté redoutable, avec une bande-son chiptune de SoulEye inoubliable et un game design d'une élégance absolue." },
  // ── 2011 ──
  { year:2011, slug:"rayman-origins",                                    title:"Rayman Origins",                                  platform:"Multi-plateformes",          publisher:"Ubisoft Montpellier",              genre:"Platformer",          emoji:"🦊", desc:"Retour en 2D pour Rayman dans des mondes aquarellés d'une beauté sidérante. Fruit du moteur UbiArt révolutionnant l'animation 2D, ce platformer coopératif jusqu'à 4 joueurs est une déclaration d'amour au médium." },
  { year:2011, slug:"bastion",                                           title:"Bastion",                                         platform:"PC / Xbox 360",              publisher:"Supergiant Games",                 genre:"Action-RPG",         emoji:"⚔️", desc:"The Kid reconstruit le Bastion dans un monde fracturé, guidé par la voix narrative réactive de Rucks qui commente chaque action en temps réel. Premier jeu de Supergiant, un coup de maître visuel, sonore et ludique." },
  // ── 2012 ──
  { year:2012, slug:"the-walking-dead",                                  title:"The Walking Dead: Season 1",                      platform:"Multi-plateformes",          publisher:"Telltale Games",                   genre:"Aventure narrative",  emoji:"📖", desc:"Lee Everett protège la petite Clementine dans un monde dévasté par les zombies. Telltale réinvente le jeu narratif épisodique avec des choix déchirants, des personnages profonds et une conclusion inoubliable." },
  { year:2012, slug:"hotline-miami",                                     title:"Hotline Miami",                                   platform:"PC / PS3 / PS Vita",         publisher:"Dennaton Games / Devolver Digital", genre:"Action",             emoji:"🔪", desc:"Tueur masqué assassine des gangsters au rythme d'une bande-son synthwave hypnotique dans une Miami néon des années 80. Ultra-violent et ultra-nerveux, il questionne notre rapport à la violence dans les jeux vidéo." },
  { year:2012, slug:"spec-ops-the-line",                                 title:"Spec Ops: The Line",                              platform:"PC / PS3 / Xbox 360",        publisher:"Yager Development / 2K",           genre:"TPS",                 emoji:"💀", desc:"Shooter militaire en apparence, déconstruction lucide du genre en réalité. Inspiré de Au Cœur des Ténèbres de Conrad, il confronte le joueur à ses propres actes dans une Dubaï apocalyptique d'une noirceur rare." },
  { year:2012, slug:"fez",                                               title:"Fez",                                             platform:"Xbox 360 / PC / PS4",        publisher:"Polytron Corporation",             genre:"Puzzle-Platformer",   emoji:"🧩", desc:"Gomez découvre la troisième dimension dans son monde 2D grâce à un fez magique. Puzzle-platformer de Phil Fish avec une rotation ingénieuse et des mystères cryptiques qui ont alimenté des mois d'exploration communautaire." },
  // ── 2013 ──
  { year:2013, slug:"the-stanley-parable",                               title:"The Stanley Parable",                             platform:"PC",                         publisher:"Galactic Cafe",                    genre:"Aventure narrative",  emoji:"📖", desc:"Stanley suit — ou non — les instructions d'un narrateur omniscient. Expérience métafictionnelle sur le libre arbitre et la condition du joueur. Drôle, philosophique et proprement fascinant — un objet vidéoludique unique." },

/* ── RENDER ── */
function render() {
  const root = document.getElementById('root');
  const decades = [
    { label:'1990s', range:[1990,2000] },
    { label:'2000s', range:[2000,2010] },
    { label:'2010s', range:[2010,2020] },
    { label:'2020s', range:[2020,2030] }
  ];
  decades.forEach(dec => {
    const [from, to] = dec.range;
    const group = GAMES.filter(g => g.year >= from && g.year < to);
    if (!group.length) return;
    const sep = document.createElement('div');
    sep.className = 'decade-sep';
    sep.innerHTML = `<span class="decade-label">// ${dec.label}</span>`;
    root.appendChild(sep);
    const tl = document.createElement('div');
    tl.className = 'timeline';
    group.forEach(g => {
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `
        <span class="year-badge">${g.year}</span>
        <div class="card">
          <div class="card-content">
            <div class="card-title">${g.title}</div>
            <div class="card-platform">${g.platform} &nbsp;·&nbsp; ${g.publisher}</div>
            <div class="card-desc">${g.desc}</div>
            <span class="tag">${g.genre}</span>
          </div>
          <div class="card-image">
            <div class="img-placeholder">
              <span class="ph-emoji">${g.emoji}</span>
              <span class="ph-text">chargement…</span>
            </div>
            <img data-slug="${g.slug}" alt="${g.title}" loading="lazy" />
          </div>
        </div>`;
      tl.appendChild(entry);
    });
    root.appendChild(tl);
  });
}

/* ── INTERSECTION OBSERVER ── */
function initObserver() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.07 });
  document.querySelectorAll('.entry').forEach(el => io.observe(el));
}

/* ── RAWG COVER LOADING ── */
async function fetchImages() {
  const imgs  = Array.from(document.querySelectorAll('img[data-slug]')); // FIX 1 : data-slug
  const bar   = document.getElementById('img-progress');
  const total = imgs.length;   // FIX 2 : total défini ici
  let loaded  = 0;

  const CONCURRENCY = 2;
  let index = 0;

  async function fetchNext() {
    while (index < imgs.length) {
      const img  = imgs[index++];
      const slug = img.dataset.slug;
      const url  = `https://api.rawg.io/api/games/${encodeURIComponent(slug)}?key=${RAWG_KEY}`; // FIX 3 : RAWG_KEY

      try {
        const res  = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const src  = data.background_image || data.background_image_additional;

        if (src) {
          const fullSrc = src.replace(/\/resize\/\d+\/-\//, '/');
          img.src = fullSrc;
          img.onload = () => {
            img.classList.add('loaded');
            img.previousElementSibling?.classList.add('hidden');
            loaded++;
            bar.style.width = Math.round((loaded / total) * 100) + '%';
            if (loaded >= total) setTimeout(() => { bar.style.opacity = '0'; }, 900);
          };
          img.onerror = () => { loaded++; bar.style.width = Math.round((loaded / total) * 100) + '%'; };
        } else {
          loaded++;
          bar.style.width = Math.round((loaded / total) * 100) + '%';
        }
      } catch(e) {
        console.warn(`RAWG error for "${slug}":`, e.message);
        loaded++;
        bar.style.width = Math.round((loaded / total) * 100) + '%';
      }
    }
  }

  const workers = Array.from({ length: CONCURRENCY }, fetchNext);
  await Promise.all(workers);
}

/* ── MODAL ── */
function initModal() {
  const modal      = document.getElementById('modal');
  const modalImg   = document.getElementById('modal-img');
  const modalTitle = document.getElementById('modal-title');
  const modalYear  = document.getElementById('modal-year');
  const modalClose = document.getElementById('modal-close');

  function openModal(src, title, year) {
    modalImg.src      = src;
    modalImg.alt      = title;
    modalTitle.textContent = title;
    modalYear.textContent  = year;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Click on any card-image
  document.getElementById('root').addEventListener('click', e => {
    const imgWrap = e.target.closest('.card-image');
    if (!imgWrap) return;
    const img = imgWrap.querySelector('img.loaded');
    if (!img) return; // no image loaded yet
    const card  = imgWrap.closest('.card');
    const title = card.querySelector('.card-title').textContent;
    const year  = card.closest('.entry').querySelector('.year-badge').textContent;
    openModal(img.src, title, year);
  });

  // Close on backdrop click
  modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
  });

  // Close button
  modalClose.addEventListener('click', closeModal);

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
}

render();
initObserver();
initModal();
fetchImages();
</script>
